services:
  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    restart: always
    # No public ports exposed for the server, it will be accessed via Next.js rewrites on the internal network
    env_file:
      - ./apps/server/.env
    networks:
      - otbl-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - server
    networks:
      - otbl-network

networks:
  otbl-network:
    driver: bridge
