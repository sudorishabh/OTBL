services:
  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    restart: always
    ports:
      - "7200:7200" # Explicitly exposing port 7200 for external access
    env_file:
      - ./apps/server/.env
    environment:
      - NODE_ENV=production
    networks:
      - otbl-network

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - server
    networks:
      - otbl-network

networks:
  otbl-network:
    driver: bridge
